<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Recipe - KoalaBrew</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="top-navbar">
    <div class="logo">🐨 KoalaBrew</div>
    <div class="nav-menu">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('add_recipe') }}">Add Recipe</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>

<div class="form-page">
    <div class="landing-box form-box">
        <div class="koala-icon">🐨</div>

        <h1>Edit Recipe</h1>
        <p>Update your coffee recipe.</p>

        <form method="POST" class="clean-form">
            <input type="text" name="title" value="{{ recipe.title }}" required>
            <input type="text" name="category" value="{{ recipe.category }}" required>

            <textarea name="ingredients" required>{{ recipe.ingredients }}</textarea>
            <textarea name="instructions" required>{{ recipe.instructions }}</textarea>

            <input type="number" step="0.01" name="cost" value="{{ recipe.cost }}" required>

            <select name="type">
                <option value="Hot" {% if recipe.type == "Hot" %}selected{% endif %}>Hot</option>
                <option value="Iced" {% if recipe.type == "Iced" %}selected{% endif %}>Iced</option>
            </select>

            <button type="submit">Update Recipe</button>
        </form>

        <a class="text-link" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
