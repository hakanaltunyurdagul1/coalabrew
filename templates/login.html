<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KoalaBrew</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="landing-page">
    <div class="landing-box small-box">
        <div class="koala-icon">🐨</div>

        <h1>Login</h1>
        <p>Welcome back to KoalaBrew.</p>

        <form method="POST" class="clean-form">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <a class="text-link" href="{{ url_for('register') }}">Create an account</a>
    </div>
</div>

</body>
</html>
